name: aifs-ea-an-oper-0001-mars-o48-2025-2025-6h-v1-testing
description: Coarse global dataset for CI/CD testing, 20250927T00Z-20251004T06Z, resolution O48. For testing streched grid.
dates:
  start: '2025-09-27T00:00:00+00:00'
  end: '2025-10-04T06:00:00+00:00'
  frequency: 6h
statistics:
    start: 2025
    end: 2025
input:
  join:
  - mars: # surface parameters
      param:
      - 2t
      - msl
      - 10u
      - 10v
      - lsm
      - sp
      - skt
      - tcw
      - z
      - 2d
      - hcc # added high cloud cover
      - mcc # added medium cloud cover
      - lcc # added low cloud cover
      - tcc # added total cloud cover
      - swvl1 # added soil moisture top layer
      - stl1 # added soil temperature top layer
      - sdor
      - slor
      levtype: sfc
      class: od
      type: an
      stream: oper
      expver: '0001'
      grid: O48
  - mars: # pressure level parameters
      param:
      - u
      - v
      - w
      - q
      - t
      - z
      levtype: pl
      class: od
      type: an
      stream: oper
      expver: '0001'
      level:
      - 50
      - 100
      - 150
      - 200
      - 250
      - 300
      - 400
      - 500
      - 600
      - 700
      - 850
      - 925
      - 1000
      grid: O48
  - forcings:
      template: ${input.join.1.mars}
      param:
      - cos_local_time
      - sin_local_time
      - cos_julian_day
      - sin_julian_day
      - longitude
      - latitude
      - cos_latitude
      - sin_latitude
      - cos_longitude
      - sin_longitude
      - insolation
  - accumulate:
      period: 6h
      availability: auto    # or set explicitly if you prefer
      source:
        mars:
          param:
          - tp
          - cp
          - ssrd
          - strd
          levtype: sfc
          class: od
          type: fc          # accumulations come from forecasts, not analyses
          stream: oper
          expver: '0001'
          grid: O48

build:
  group_by: 32
