# This workflow adds a link to the experimental documentation build to the PR.
# This does NOT trigger a build of the documentation, this is handled through webhooks.
name: Read the Docs PR Preview
on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
    # Execute this action only on PRs that touch
    # documentation files.
    paths:
      - "docs/**"

permissions:
  pull-requests: write

jobs:
  documentation-links:
    runs-on: ubuntu-latest
    steps:
      - uses: readthedocs/actions/preview@v1
        with:
          project-slug: "anemoi"

  documentation-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install .
      - name: Build documentation (warnings as errors)
        run: sphinx-build -W --keep-going docs/ docs/_build/html
