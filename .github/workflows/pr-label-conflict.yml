# This workflow labels pull requests that have merge conflicts.
# The label is automatically removed once conflicts are resolved.
# The "conflict" label is auto-created on first run if it doesn't exist.
name: "[PR] Label Conflict"
on:
  push:
    branches: [main]
  pull_request_target:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  conflict-label:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure conflict label exists
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'conflict'
              });
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: 'conflict',
                  color: 'd73a4a',
                  description: 'This PR has merge conflicts that need to be resolved'
                });
              }
            }
      - name: Label conflicting PRs
        uses: eps1lon/actions-label-merge-conflict@v3
        with:
          dirtyLabel: "conflict"
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          continueOnMissingPermissions: true
